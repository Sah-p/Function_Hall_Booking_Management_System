<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 400px;
            max-width: 90%;
            position: relative;
            overflow: hidden;
        }
        .wave {
            position: absolute;
            width: 100%;
            bottom: 0;
            left: 0;
            z-index: -1;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea {
            height: 120px;
            resize: none;
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: #ffffff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        .success-message {
            color: #28a745;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }
        #feedbackList {
            margin-top: 30px;
            padding: 0;
            list-style: none;
        }
        #feedbackList li {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        #feedbackList li:last-child {
            margin-bottom: 0;
        }
        #feedbackList li p {
            margin: 0;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>User Feedback</h2>
        <form id="feedbackForm" action="#" method="post">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
            <label for="feedback">Your Feedback:</label>
            <textarea id="feedback" name="feedback" placeholder="Enter your feedback" required></textarea>
            <input type="submit" value="Submit Feedback">
        </form>
        <div id="successMessage" class="success-message" style="display: none;">Feedback successfully submitted!</div>
        <img class="wave" src="https://cdn.pixabay.com/photo/2017/02/20/18/03/wave-2083209_960_720.png" alt="Wave Background">
    </div>
    <ul id="feedbackList"></ul>
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the default form submission

            const name = document.getElementById('name').value;
            const feedback = document.getElementById('feedback').value;

            try {
                fetch('/submit_feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name: name, feedback: feedback }),
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('feedbackForm').reset();
                    // Fetch and display feedback data after form submission
                    fetchFeedbackData();
                })
                .catch((error) => {
                    console.error('Error:', error);
                });
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // Function to fetch and display feedback data
        function fetchFeedbackData() {
            fetch('/get_feedback_data')
            .then(response => response.json())
            .then(data => {
                const feedbackList = document.getElementById('feedbackList');
                feedbackList.innerHTML = ''; // Clear previous feedback data
                data.forEach(feedback => {
                    const li = document.createElement('li');
                    li.textContent = `${feedback[1]}: ${feedback[2]}`;
                    feedbackList.appendChild(li);
                });
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        }

        // Fetch and display feedback data when the page loads
        window.onload = fetchFeedbackData;
    </script>
</body>
</html>
