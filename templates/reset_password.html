<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff7e5f, #feb47b); /* Gradient background */
        }

        .reset-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            width: 320px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-in-out; /* Fade-in animation */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .reset-container h1 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #333;
            position: relative;
            padding-bottom: 10px;
        }

        .reset-container h1::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 3px;
            background: #43a047;
            left: 50%;
            transform: translateX(-50%);
            bottom: 0;
        }

        .reset-container form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .reset-container label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .reset-container input[type="email"],
        .reset-container input[type="password"] {
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .reset-container input[type="email"]:focus,
        .reset-container input[type="password"]:focus {
            border-color: #43a047;
        }

        .reset-container button {
            padding: 12px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .reset-container button::before {
            content: '';
            position: absolute;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            transition: width 0.5s, height 0.5s;
        }

        .reset-container button:hover::before {
            width: 0;
            height: 0;
        }

        .reset-container p {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #333;
        }

        .reset-container a {
            color: #43a047;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .reset-container a:hover {
            color: #388e3c;
            text-decoration: underline;
        }

        .flash-message p {
            text-align: center;
            margin-bottom: 20px;
        }

        .flash-message p.error {
            color: red;
        }

        .flash-message p.success {
            color: green;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h1>Reset Password</h1>
        <form action="/reset_password" method="POST">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="new_password">New Password:</label>
            <input type="password" id="new_password" name="new_password" required>

            <label for="confirm_password">Confirm New Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>

            <button type="submit">Reset Password</button>
        </form>
        <!-- Display Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-message">
                {% for category, message in messages %}
                    <p class="{{ category }}">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
    </div>
</body>
</html>
