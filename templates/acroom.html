<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AC Rooms</title>
    <style>
        body {
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-family: 'Georgia', serif;
            color: #2c3e50;
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .hall-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin-top: 20px;
        }
        .hall-card {
            background-color: #ecf0f1;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px;
            width: 300px;
            text-align: center;
            transition: transform 0.3s;
        }
        .hall-card:hover {
            transform: scale(1.05);
        }
        .hall-card img {
            width: 100%;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .hall-card h2 {
            color: #34495e;
            font-size: 24px;
            margin: 15px 0;
        }
        .hall-card button {
            color: #34495e;
            background-color: #ecf0f1;
            border: 2px solid #34495e;
            padding: 10px 20px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, color 0.3s;
        }
        .hall-card button:hover {
            background-color: #34495e;
            color: #ecf0f1;
        }
        /* Styles for popup */
        .popup {
            display: none;
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -25%);
            background-color: #f7f7f7;
            border: 1px solid #ddd;
            padding: 20px;
            z-index: 1000;
            width: 80%;
            max-width: 800px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .popup h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .popup button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #34495e;
        }
        .popup button#close-btn {
            background-color: #ecf0f1;
            color: #34495e;
        }
        .popup button#close-btn:hover {
            background-color: #34495e;
            color: #ecf0f1;
        }
        .popup button#register-btn {
            background-color: #34495e;
            color: #ecf0f1;
        }
        .popup button#register-btn:hover {
            background-color: #ecf0f1;
            color: #34495e;
        }
        .navigation {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .navigation a {
            text-decoration: none;
            color: #34495e;
            font-size: 18px;
        }
        .navigation a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="navigation">
        <a href="homepage">Back</a>
    </div>
    <div class="container">
        <h1>AC Rooms</h1>
        <div class="hall-grid">
            {% for hall in hall_names %}
            <div class="hall-card">
                <img src="{{ url_for('static', filename=hall['hall_image']) }}" alt="Hall Image">
                <h2>{{ hall['hall_name'] }}</h2>
                <button type="button" class="hall-btn" data-hall="{{ hall['hall_name'] }}">
                    View Details
                </button>
            </div>
            {% endfor %}
        </div>
        
        <!-- Popup window to display hall details -->
        <div id="popup" class="popup">
            <h2 id="popup-title"></h2>
            <div id="popup-content"></div>
            <button id="close-btn">Close</button>
            <a href="hallreg.html"><button type="button" id="register-btn">Register</button></a>
        </div>
    </div>

    <!-- JavaScript to handle popup and fetch hall details -->
    <script>
    // Event listener for hall buttons
    document.querySelectorAll('.hall-btn').forEach(button => {
        button.addEventListener('click', function() {
            const hallName = this.getAttribute('data-hall');
            fetchHallDetails(hallName);
        });
    });

    // Function to fetch hall details and display popup
    function fetchHallDetails(hallName) {
        fetch('/hall_details', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ hallName: hallName })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('popup-title').innerText = hallName;
            document.getElementById('popup-content').innerHTML = '';
            for (const key in data) {
                if (data.hasOwnProperty(key)) {
                    const row = document.createElement('div');
                    row.innerText = `${key}: ${data[key]}`;
                    document.getElementById('popup-content').appendChild(row);
                }
            }
            document.getElementById('popup').style.display = 'block';
        })
        .catch(error => console.error('Error fetching hall details:', error));
    }

    // Event listener for close button
    document.getElementById('close-btn').addEventListener('click', function() {
        document.getElementById('popup').style.display = 'none';
    });
    </script>
</body>
</html>
